<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Psymed · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../psymed.css">
</head>
<body class="bg-dark">
<div>
        
        <div style="width:100%;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 22px 48px -16px rgba(5,22,28,.6);border:1px solid rgba(255,255,255,.04)">
          <div style="display:flex;height:620px">
            <div style="width:430px;background:linear-gradient(160deg,#0E7C86,#0A4A54);color:#fff;padding:46px 40px;display:flex;flex-direction:column;justify-content:space-between">
              <div>
                <div style="display:flex;align-items:center;gap:10px"><span style="width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700">+</span><span style="font-weight:800;font-size:18px">Psymed</span></div>
                <div style="margin-top:64px;font-size:31px;font-weight:800;line-height:1.22">Cuidado clínico,<br>organizado.</div>
                <div style="margin-top:17px;font-size:15px;color:rgba(255,255,255,.82);line-height:1.6;max-width:300px">Gestiona pacientes, historias clínicas y citas desde un solo lugar.</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:11px">
                <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,.85)"><span style="width:22px;height:22px;border-radius:7px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L20 6"></path></svg></span>Historias clínicas centralizadas</div>
                <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,.85)"><span style="width:22px;height:22px;border-radius:7px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L20 6"></path></svg></span>Seguimiento de ánimo y funciones</div>
              </div>
            </div>
            <div style="flex:1;padding:0 56px;display:flex;flex-direction:column;justify-content:center">
              <div style="font-size:25px;font-weight:800">Iniciar sesión</div>
              <div style="color:#0E7C86;font-weight:600;font-size:14px;margin-top:5px">Portal del doctor</div>
              <div style="margin-top:32px">
                <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Email</label>
                <div style="height:48px;border:1px solid #DCE4E7;border-radius:11px;display:flex;align-items:center;padding:0 15px;color:#16242B;font-size:14px;margin-bottom:18px">dra.soto@clinica.com</div>
                <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Contraseña</label>
                <div style="height:48px;border:1px solid #DCE4E7;border-radius:11px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;color:#9DB0BA;font-size:18px;letter-spacing:3px;margin-bottom:10px"><span>••••••••••</span><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#9DB0BA" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg></div>
                <div style="text-align:right;font-size:13px;color:#0E7C86;font-weight:600;margin-bottom:22px">¿Olvidaste tu contraseña?</div>
                <div style="height:50px;border-radius:11px;background:#0E7C86;color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px -6px rgba(14,124,134,.55)">Entrar</div>
                <div style="text-align:center;font-size:14px;color:#5C6E78;margin-top:24px;padding-top:22px;border-top:1px solid #EEF2F4">¿No tienes cuenta? <span style="color:#0E7C86;font-weight:700">Regístrate</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>
<script>window.PSYMED_ROLE="doctor";</script>
<script src="../psymed.js"></script>
</body>
</html>
