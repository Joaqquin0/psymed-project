<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Psymed · Medicación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../psymed.css">
</head>
<body class="bg-white">
<div>
        
        <div style="width:100%;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 22px 48px -16px rgba(5,22,28,.6);border:1px solid rgba(255,255,255,.04)">
          <div style="height:56px;display:flex;align-items:center;gap:18px;padding:0 20px;border-bottom:1px solid #ECF1F3;background:#fff">
            <div style="display:flex;align-items:center;gap:9px"><span style="width:26px;height:26px;border-radius:8px;background:#0E7C86;color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700">+</span><span style="font-weight:800;font-size:15px;color:#0E5C66">Psymed</span></div>
            <div style="display:flex;gap:3px;margin-left:6px"><span style="padding:7px 13px;border-radius:9px;color:#5C6E78;font-weight:600;font-size:13px">Agenda</span><span style="padding:7px 13px;border-radius:9px;background:#E6F2F3;color:#0A5C64;font-weight:700;font-size:13px">Pacientes</span><span style="padding:7px 13px;border-radius:9px;color:#5C6E78;font-weight:600;font-size:13px">Citas</span></div>
            <div style="margin-left:auto;display:flex;align-items:center;gap:12px"><span style="width:34px;height:34px;border-radius:9px;background:#F4F7F9;border:1px solid #EAEFF1;display:flex;align-items:center;justify-content:center"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#5C6E78" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.5 5.5l2 2M16.5 16.5l2 2M18.5 5.5l-2 2M7.5 16.5l-2 2"></path></svg></span><span style="width:34px;height:34px;border-radius:50%;background:#0E7C86;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">LS</span></div>
          </div>
          <div style="height:600px;padding:26px 30px;background:#FAFCFD;display:flex;gap:24px">
            <div style="width:430px;flex:none;background:#fff;border:1px solid #EAEFF1;border-radius:14px;padding:22px">
              <div style="font-size:16px;font-weight:800;margin-bottom:3px">Añadir medicamento</div>
              <div style="font-size:12.5px;color:#7C8B94;margin-bottom:20px">Para Pedro Pablo</div>
              <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Medicamento</label>
              <input class="psy-input psy-input-sm" type="text" value="Sertralina" style="margin-bottom:16px">
              <div style="display:flex;gap:14px;margin-bottom:16px">
                <div style="flex:1"><label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Dosis</label><input class="psy-input psy-input-sm" type="text" value="50 mg"></div>
                <div style="flex:1"><label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Cantidad</label><input class="psy-input psy-input-sm" type="text" value="30 comp."></div>
              </div>
              <div style="display:flex;gap:14px;margin-bottom:22px">
                <div style="flex:1"><label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Inicio</label><input class="psy-input psy-input-sm" type="date" value="2026-06-15"></div>
                <div style="flex:1"><label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Fin</label><input class="psy-input psy-input-sm" type="date" value="2026-09-15"></div>
              </div>
              <div data-back style="height:48px;border-radius:11px;background:#0E7C86;color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 9px 18px -6px rgba(14,124,134,.5)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path><path d="M17 21v-8H7v8M7 3v5h8"></path></svg>Save</div>
            </div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><span style="font-size:16px;font-weight:800">Medicamentos actuales</span><span style="font-size:12.5px;color:#93A4AE">4 activos</span></div>
              <div style="display:flex;flex-direction:column;gap:11px">
                <div style="display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #EAEFF1;border-radius:12px;padding:14px 16px"><span style="width:40px;height:40px;border-radius:10px;background:#E6F2F3;color:#0A5C64;display:flex;align-items:center;justify-content:center"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#0A5C64" stroke-width="2"><path d="M10.5 20.5l10-10a4.95 4.95 0 00-7-7l-10 10a4.95 4.95 0 007 7z"></path><path d="M8.5 8.5l7 7"></path></svg></span><div style="flex:1"><div style="font-weight:700;font-size:14px">Sertralina 50mg</div><div style="font-size:12px;color:#93A4AE">1 / día · 15 jun – 15 sep</div></div><span style="font-size:11px;font-weight:700;color:#1F7A53;background:#E4F4EC;border-radius:7px;padding:4px 9px">Activo</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9DB0BA" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"></path></svg></div>
                <div style="display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #EAEFF1;border-radius:12px;padding:14px 16px"><span style="width:40px;height:40px;border-radius:10px;background:#E6F2F3;color:#0A5C64;display:flex;align-items:center;justify-content:center"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#0A5C64" stroke-width="2"><path d="M10.5 20.5l10-10a4.95 4.95 0 00-7-7l-10 10a4.95 4.95 0 007 7z"></path><path d="M8.5 8.5l7 7"></path></svg></span><div style="flex:1"><div style="font-weight:700;font-size:14px">Lorazepam 1mg</div><div style="font-size:12px;color:#93A4AE">según necesidad</div></div><span style="font-size:11px;font-weight:700;color:#1F7A53;background:#E4F4EC;border-radius:7px;padding:4px 9px">Activo</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9DB0BA" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"></path></svg></div>
                <div style="display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #EAEFF1;border-radius:12px;padding:14px 16px"><span style="width:40px;height:40px;border-radius:10px;background:#E6F2F3;color:#0A5C64;display:flex;align-items:center;justify-content:center"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#0A5C64" stroke-width="2"><path d="M10.5 20.5l10-10a4.95 4.95 0 00-7-7l-10 10a4.95 4.95 0 007 7z"></path><path d="M8.5 8.5l7 7"></path></svg></span><div style="flex:1"><div style="font-weight:700;font-size:14px">Melatonina 2mg</div><div style="font-size:12px;color:#93A4AE">1 / noche</div></div><span style="font-size:11px;font-weight:700;color:#1F7A53;background:#E4F4EC;border-radius:7px;padding:4px 9px">Activo</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9DB0BA" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"></path></svg></div>
                <div style="display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #EAEFF1;border-radius:12px;padding:14px 16px;opacity:.62"><span style="width:40px;height:40px;border-radius:10px;background:#F0F2F3;color:#93A4AE;display:flex;align-items:center;justify-content:center"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#93A4AE" stroke-width="2"><path d="M10.5 20.5l10-10a4.95 4.95 0 00-7-7l-10 10a4.95 4.95 0 007 7z"></path><path d="M8.5 8.5l7 7"></path></svg></span><div style="flex:1"><div style="font-weight:700;font-size:14px">Ibuprofeno 400mg</div><div style="font-size:12px;color:#93A4AE">finalizado · 01 may</div></div><span style="font-size:11px;font-weight:700;color:#7C8B94;background:#EEF1F2;border-radius:7px;padding:4px 9px">Inactivo</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9DB0BA" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"></path></svg></div>
              </div>
            </div>
          </div>
        </div>
      </div>
<script>window.PSYMED_ROLE="doctor";</script>
<script src="../psymed.js"></script>
</body>
</html>
