<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Psymed · Registro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../psymed.css">
</head>
<body class="bg-dark">
<div>
        
        <div style="width:100%;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 22px 48px -16px rgba(5,22,28,.6);border:1px solid rgba(255,255,255,.04)">
          <div style="height:620px;background:#EEF3F5;display:flex;align-items:center;justify-content:center;padding:30px">
            <div style="width:600px;background:#fff;border:1px solid #EAEFF1;border-radius:18px;padding:38px 42px;box-shadow:0 14px 36px -16px rgba(8,30,38,.22)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <div style="font-size:23px;font-weight:800">Crear cuenta</div>
                <span style="font-size:11px;font-weight:700;color:#0A5C64;background:#E0EFF0;border:1px solid #BFE0E3;border-radius:8px;padding:5px 11px">Solo doctores</span>
              </div>
              <div style="font-size:14px;color:#5C6E78;margin-bottom:26px">El alta de pacientes la realiza el doctor desde el panel.</div>
              <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Nombre completo</label>
              <input class="psy-input" type="text" value="Dra. Lucía Soto" style="margin-bottom:16px">
              <div style="display:flex;gap:16px;margin-bottom:16px">
                <div style="flex:1">
                  <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Especialidad</label>
                  <select class="psy-input" style="cursor:pointer">
                    <option>Psiquiatría</option>
                    <option>Psicología</option>
                    <option>Neurología</option>
                    <option>Medicina general</option>
                  </select>
                </div>
                <div style="flex:1">
                  <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Nº colegiado</label>
                  <input class="psy-input" type="text" value="28-45219">
                </div>
              </div>
              <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Email</label>
              <input class="psy-input" type="email" value="dra.soto@clinica.com" style="margin-bottom:16px">
              <div style="display:flex;gap:16px;margin-bottom:20px">
                <div style="flex:1">
                  <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Contraseña</label>
                  <div class="psy-pw-wrap">
                    <input id="reg-pw1" class="psy-input" type="password" value="psymed2026" style="letter-spacing:3px">
                    <button class="psy-pw-toggle" onclick="(function(){var i=document.getElementById('reg-pw1');i.type=i.type==='password'?'text':'password'}).call(this)">
                      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                  </div>
                </div>
                <div style="flex:1">
                  <label style="display:block;font-size:13px;font-weight:600;color:#3E535D;margin:0 0 7px">Confirmar</label>
                  <div class="psy-pw-wrap">
                    <input id="reg-pw2" class="psy-input" type="password" value="psymed2026" style="letter-spacing:3px">
                    <button class="psy-pw-toggle" onclick="(function(){var i=document.getElementById('reg-pw2');i.type=i.type==='password'?'text':'password'}).call(this)">
                      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                  </div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px"><span style="width:20px;height:20px;border-radius:6px;background:#0E7C86;display:flex;align-items:center;justify-content:center;flex:none"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L20 6"></path></svg></span><span style="font-size:13px;color:#5C6E78">Acepto los términos y la política de datos clínicos</span></div>
              <div data-nav="agenda.html" style="height:50px;border-radius:11px;background:#0E7C86;color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px -6px rgba(14,124,134,.5)">Crear cuenta</div>
              <div style="text-align:center;font-size:14px;color:#5C6E78;margin-top:18px">¿Ya tienes cuenta? <span data-nav="login.html" style="color:#0E7C86;font-weight:700">Inicia sesión</span></div>
            </div>
          </div>
        </div>
      </div>
<script>window.PSYMED_ROLE="doctor";</script>
<script src="../psymed.js"></script>
</body>
</html>
